name: Build test

on:
  push:
    branches: [main]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Build de l'image Docker
        run: docker build -t nodejs_postgres-node:latest .

      - name: Lancement du curl
        run: |
            sleep 10 
            curl -X get http://localhost:3000/api