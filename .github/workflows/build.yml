name: Test Backend

on:
  push:

jobs:
  test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run
        run: docker compose up -d --build

      - name: Wait
        run: sleep 10

      - name: Test
        run: curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/api

      # --- AJOUTS POUR LE BUILD ET LE PUSH ---

      - name: Connexion à Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build de l'image Docker
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/nodejs_postgres-node:latest .

      - name: Push de l'image vers Docker Hub
        run: docker push ${{ secrets.DOCKER_USERNAME }}/nodejs_postgres-node:latest